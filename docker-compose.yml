services:
  backend:
    build:
      context: ./backend
    container_name: quizhub-backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-quizhub-local-docker-secret-change-before-public-deployment-2026}
      DATABASE_URL: sqlite:///data/quizhub.db
      UPLOAD_DIR: /data/uploads
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
    volumes:
      - backend_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: quizhub-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
